version: '3.8'

services:
  yzmm-status-agent:
    build: .
    container_name: yzmm-status-agent
    restart: unless-stopped
    network_mode: host
    pid: host
    environment:
      - API_ENDPOINT=https://你的pages域名/api/update
      - UPDATE_TOKEN=你的UPDATE_TOKEN
      - INTERVAL_MS=60000
      - LOCAL_SERVICES=AstrBot:6185  # 格式: 服务名:端口,服务名:端口
    volumes:
      - /proc:/proc:ro
      - /sys:/sys:ro
      - /etc/os-release:/etc/os-release:ro
