version: '3.8'

services:
  yzmm-status-agent:
    build: .
    container_name: yzmm-status-agent
    restart: unless-stopped
    network_mode: host
    pid: host
    environment:
      - API_ENDPOINT=https://你的pages域名/api/update
      - UPDATE_TOKEN=你的UPDATE_TOKEN
      - INTERVAL_MS=60000
      - CPU_CORES=8:12  # 大核:小核
      - MEMORY_INFO=DDR5 32GBx2通道 5600MT/s  # 内存信息，不配置则不显示
    volumes:
      - /proc:/proc:ro
      - /sys:/sys:ro
      - /etc/os-release:/etc/os-release:ro
